# Alembic configuration for the AssetMind AI API.
#
# Run migration commands from the apps/api directory, e.g.:
#   cd apps/api && alembic upgrade head
#
# The database URL is intentionally NOT set here. It is read from the
# application config (DATABASE_URL) inside alembic/env.py so that no
# connection string is duplicated or committed.

[alembic]
# Path to migration scripts, relative to this file (apps/api).
script_location = alembic

# Template used to generate migration file names; prefixes with a UTC
# timestamp for stable ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use os.pathsep to split the version locations.
version_path_separator = os

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
